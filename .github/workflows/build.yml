name: Build Multi-App Cloner APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

    - name: Grant execute permission
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: BlackBox-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: BlackBox-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Build Summary
      run: |
        echo "## 📦 多开器构建完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| 产物 | 说明 |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| **BlackBox-Debug** | 调试版，可直接安装 |" >> $GITHUB_STEP_SUMMARY
        echo "| **BlackBox-Release** | 正式版，可直接安装 |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 使用方法" >> $GITHUB_STEP_SUMMARY
        echo "1. 下载并安装 APK 到手机" >> $GITHUB_STEP_SUMMARY
        echo "2. 打开 BlackBox，点击 + 添加已安装的闲鱼" >> $GITHUB_STEP_SUMMARY
        echo "3. 在 BlackBox 内启动克隆的闲鱼" >> $GITHUB_STEP_SUMMARY
        echo "4. 可长按创建桌面快捷方式" >> $GITHUB_STEP_SUMMARY
